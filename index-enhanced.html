<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Pong Game</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        canvas { border: 1px solid black; }
        #score { font-size: 24px; }
    </style>
</head>
<body>
    <h1>Enhanced Pong Game</h1>
    <div id="score">
        Player 1: <span id="player1Score">0</span> - Player 2: <span id="player2Score">0</span>
    </div>
    <canvas id="pong" width="800" height="400"></canvas>
    <script>
        // Basic game setup
        const canvas = document.getElementById('pong');
        const context = canvas.getContext('2d');

        let player1Score = 0;
        let player2Score = 0;
        const paddleWidth = 10, paddleHeight = 100, ballSize = 10;

        const player1 = { x: 0, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight }; 
        const player2 = { x: canvas.width - paddleWidth, y: canvas.height / 2 - paddleHeight / 2, width: paddleWidth, height: paddleHeight }; 
        const ball = { x: canvas.width / 2, y: canvas.height / 2, size: ballSize, speedX: 5, speedY: 5 };

        document.addEventListener('keydown', movePaddles);

        function movePaddles(event) {
            switch(event.key) {
                case 'ArrowUp':
                    player2.y -= 20;
                    break;
                case 'ArrowDown':
                    player2.y += 20;
                    break;
                case 'w':
                    player1.y -= 20;
                    break;
                case 's':
                    player1.y += 20;
                    break;
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function update() {
            ball.x += ball.speedX;
            ball.y += ball.speedY;

            if (ball.y + ball.size >= canvas.height || ball.y <= 0) {
                ball.speedY = -ball.speedY;
            }

            // Ball and paddle collision
            if((ball.x <= player1.x + paddleWidth && ball.y + ball.size >= player1.y && ball.y <= player1.y + paddleHeight) || 
               (ball.x + ball.size >= player2.x && ball.y + ball.size >= player2.y && ball.y <= player2.y + paddleHeight)) {
                ball.speedX = -ball.speedX;
            }

            if (ball.x < 0) {
                player2Score++;
                resetBall();
            } else if (ball.x > canvas.width) {
                player1Score++;
                resetBall();
            }

            document.getElementById('player1Score').textContent = player1Score;
            document.getElementById('player2Score').textContent = player2Score;
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.speedX = -ball.speedX;
        }

        function draw() {
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.fillStyle = 'black';
            context.fillRect(player1.x, player1.y, player1.width, player1.height);
            context.fillRect(player2.x, player2.y, player2.width, player2.height);
            context.fillRect(ball.x, ball.y, ball.size, ball.size);
        }

        // Authentication and competition handling can be added here.

        gameLoop();
    </script>
</body>
</html>
