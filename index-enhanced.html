<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }
        .container {
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .score-container {
            display: flex;
            justify-content: space-around;
            width: 800px;
            margin-bottom: 20px;
            color: white;
            font-size: 24px;
            font-weight: bold;
        }

        .score {
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 30px;
            border-radius: 10px;
        }

        canvas {
            display: block;
            background: #1a1a2e;
            border: 3px solid white;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .instructions {
            color: white;
            margin-top: 20px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            width: 800px;
        }
        .instructions p {
            margin: 5px 0;
        }
        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 20px;
            color: white;
            text-align: center;
            z-index: 1000;
            border: 3px solid #667eea;
        }

        .game-over h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .game-over p {
            font-size: 18px;
            margin: 10px 0;
        }

        .game-over button {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .game-over button:hover {
            background: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏓 PONG GAME 🏓</h1>
        <div class="score-container">
            <div class="score">Player: <span id="playerScore">0</span></div>
            <div class="score">Computer: <span id="computerScore">0</span></div>
        </div>
        <canvas id="pongCanvas" width="800" height="400"></canvas>
        <div class="instructions">
            <p><strong>Controls:</strong> Move mouse vertically OR use UP/DOWN arrow keys to control your paddle</p>
            <p>First to 11 points wins! Click canvas to start/restart the game.</p>
        </div>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2 id="gameOverTitle">Game Over!</h2>
        <p id="gameOverMessage">You won!</p>
        <button onclick="location.reload()">Play Again</button>
    </div>

    <script>
        // Canvas and context
        const canvas = document.getElementById('pongCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gameRunning = false;
        let playerScore = 0;
        let computerScore = 0;
        const winScore = 11;

        // Paddle properties
        const paddleHeight = 80;
        const paddleWidth = 10;
        const paddleSpeed = 6;

        // Player paddle (left)
        const player = {
            x: 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: paddleSpeed
        };

        // Computer paddle (right)
        const computer = {
            x: canvas.width - paddleWidth - 10,
            y: canvas.height / 2 - paddleHeight / 2,
            width: paddleWidth,
            height: paddleHeight,
            dy: 0,
            speed: paddleSpeed * 0.8
        };

        // Ball properties
        const ball = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 7,
            dx: 5,
            dy: 5,
            speed: 5
        };

        // Input handling
        const keys = {};

        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseY = e.clientY - rect.top;
            player.y = mouseY - paddleHeight / 2;
        });

        canvas.addEventListener('click', () => {
            if (!gameRunning) {
                startGame();
            }
        });

        // Game functions
        function startGame() {
            gameRunning = true;
            resetBall();
        }

        function resetBall() {
            ball.x = canvas.width / 2;
            ball.y = canvas.height / 2;
            ball.dx = (Math.random() > 0.5 ? 1 : -1) * ball.speed;
            ball.dy = (Math.random() - 0.5) * ball.speed;
        }

        function updatePlayerPaddle() {
            // Arrow keys control
            if (keys['arrowup'] && player.y > 0) {
                player.y -= player.speed;
            }
            if (keys['arrowdown'] && player.y < canvas.height - player.height) {
                player.y += player.speed;
            }

            // Constrain to canvas
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
            }
        }

        function updateComputerPaddle() {
            // Simple AI: follow the ball
            const computerCenter = computer.y + computer.height / 2;

            if (computerCenter < ball.y - 35) {
                computer.y += computer.speed;
            } else if (computerCenter > ball.y + 35) {
                computer.y -= computer.speed;
            }

            // Constrain to canvas
            if (computer.y < 0) computer.y = 0;
            if (computer.y + computer.height > canvas.height) {
                computer.y = canvas.height - computer.height;
            }
        }

        function updateBall() {
            ball.x += ball.dx;
            ball.y += ball.dy;

            // Top and bottom collision
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) {
                ball.dy = -ball.dy;
                ball.y = Math.max(ball.radius, Math.min(canvas.height - ball.radius, ball.y));
            }

            // Left paddle collision
            if (
                ball.dx < 0 &&
                ball.x - ball.radius < player.x + player.width &&
                ball.y > player.y &&
                ball.y < player.y + player.height
            ) {
                ball.dx = -ball.dx;
                ball.x = player.x + player.width + ball.radius;

                // Add spin based on where the ball hits the paddle
                const hitPos = (ball.y - (player.y + player.height / 2)) / (player.height / 2);
                ball.dy += hitPos * 3;
            }

            // Right paddle collision
            if (
                ball.dx > 0 &&
                ball.x + ball.radius > computer.x &&
                ball.y > computer.y &&
                ball.y < computer.y + computer.height
            ) {
                ball.dx = -ball.dx;
                ball.x = computer.x - ball.radius;

                // Add spin
                const hitPos = (ball.y - (computer.y + computer.height / 2)) / (computer.height / 2);
                ball.dy += hitPos * 3;
            }

            // Score and reset
            if (ball.x < 0) {
                computerScore++;
                updateScore();
                checkWin();
                if (gameRunning) resetBall();
            } else if (ball.x > canvas.width) {
                playerScore++;
                updateScore();
                checkWin();
                if (gameRunning) resetBall();
            }
        }

        function updateScore() {
            document.getElementById('playerScore').textContent = playerScore;
            document.getElementById('computerScore').textContent = computerScore;
        }

        function checkWin() {
            if (playerScore >= winScore) {
                showGameOver('You Won!', 'Congratulations! You defeated the computer!');
            } else if (computerScore >= winScore) {
                showGameOver('Game Over!', 'The computer won! Better luck next time!');
            }
        }

        function showGameOver(title, message) {
            gameRunning = false;
            document.getElementById('gameOverTitle').textContent = title;
            document.getElementById('gameOverMessage').textContent = message;
            document.getElementById('gameOverModal').style.display = 'block';
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw center line
            ctx.strokeStyle = '#444';
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(canvas.width / 2, 0);
            ctx.lineTo(canvas.width / 2, canvas.height);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw paddles
            ctx.fillStyle = '#00ff88';
            ctx.fillRect(player.x, player.y, player.width, player.height);

            ctx.fillStyle = '#ff0055';
            ctx.fillRect(computer.x, computer.y, computer.width, computer.height);

            // Draw ball
            ctx.fillStyle = '#ffff00';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();

            // Draw border
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            ctx.strokeRect(0, 0, canvas.width, canvas.height);
        }

        function gameLoop() {
            if (gameRunning) {
                updatePlayerPaddle();
                updateComputerPaddle();
                updateBall();
            }
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Start the game loop
        gameLoop();

        // Initial draw
        draw();
    </script>
</body>
</html>
